name: Bug report
description: Report reproducible incorrect behavior in OffConvert.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include private files or sensitive media metadata.
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OffConvert version
      placeholder: v0.1.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include steps, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
